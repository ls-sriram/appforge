schema: v1
repository: appforge
invariants:
  - smallest_correct_change_first
  - reuse_existing_patterns_before_new_abstractions
  - durable_architecture_is_authoritative_in_contracts
  - generated_analysis_is_never_hand_edited
  - retired_markdown_docs_are_not_authority
validation:
  require_schema_v1: true
  require_known_layers: true
  require_known_modules_in_features: true
  task_contracts_may_only_narrow_scope: true
checks:
  nearest_targeted_first: true
  broader_only_when_needed: true
generation:
  feature_structure:
    layout: flat
    optional_dirs:
      - tests
      - assets
      - mocks
  conventions:
    layer_contracts_dir: .architecture/layers
    standard_feature_roles:
      description: common feature shape used by most product features
      suffixes:
        - screen
        - view
        - scaffold
        - block
        - stage
        - viewmodel
        - store
        - usecase
        - repository
        - datasource
        - model
        - mapper
        - styles
        - contracts
    optional_specialized_roles:
      description: integration and runtime roles used only when a feature needs platform, SDK, transport, or composition-specific files
      suffixes:
        - service
        - runtime
        - dto
        - renderer
        - client
        - bridge
        - factory
        - adapter
        - capability
        - config
        - catalog
        - policy
        - handler
        - types
        - keys
        - storage
  file_suffixes:
    screen: ".screen.tsx"
    view: ".view.tsx"
    scaffold: ".scaffold.tsx"
    viewmodel: ".viewmodel.ts"
    store: ".store.ts"
    usecase: ".usecase.ts"
    repository: ".repository.ts"
    datasource: ".datasource.ts"
    service: ".service.ts"
    runtime: ".runtime.ts"
    runtime_variant: ".runtime.<variant>.ts"
    model: ".model.ts"
    dto: ".dto.ts"
    mapper: ".mapper.ts"
    block: ".block.tsx"
    stage: ".stage.tsx"
    renderer: ".renderer.tsx"
    client: ".client.ts"
    bridge: ".bridge.ts"
    factory: ".factory.ts"
    adapter: ".adapter.ts"
    capability: ".capability.ts"
    config: ".config.ts"
    catalog: ".catalog.ts"
    policy: ".policy.ts"
    handler: ".handler.ts"
    types: ".types.ts"
    keys: ".keys.ts"
    contracts: ".contract.ts"
    styles: ".styles.ts"
    storage: ".storage.ts"
  classification:
    "*.screen.tsx":
      layer: ui
      role: screen
    "*.view.tsx":
      layer: ui
      role: view
    "*.scaffold.tsx":
      layer: ui
      role: scaffold
    "*.viewmodel.ts":
      layer: viewmodel
      role: viewmodel
    "*.store.ts":
      layer: viewmodel
      role: store
    "*.usecase.ts":
      layer: usecase
      role: usecase
    "*.repository.ts":
      layer: repository
      role: repository
    "*.datasource.ts":
      layer: data
      role: datasource
    "*.service.ts":
      layer: data
      role: service
    "*.runtime.ts":
      layer: data
      role: runtime
    "*.runtime.*.ts":
      layer: data
      role: runtime
    "*.model.ts":
      layer: domain
      role: model
    "*.dto.ts":
      layer: data
      role: dto
    "*.mapper.ts":
      layer: data
      role: mapper
    "*.block.tsx":
      layer: ui
      role: block
    "*.stage.tsx":
      layer: ui
      role: stage
    "*.renderer.tsx":
      layer: ui
      role: renderer
    "*.client.ts":
      layer: data
      role: client
    "*.bridge.ts":
      layer: data
      role: bridge
    "*.factory.ts":
      layer: data
      role: factory
    "*.adapter.ts":
      layer: data
      role: adapter
    "*.capability.ts":
      layer: data
      role: capability
    "*.config.ts":
      layer: domain
      role: config
    "*.catalog.ts":
      layer: domain
      role: catalog
    "*.policy.ts":
      layer: domain
      role: policy
    "*.handler.ts":
      layer: domain
      role: handler
    "*.types.ts":
      layer: domain
      role: types
    "*.keys.ts":
      layer: domain
      role: keys
    "*.contract.ts":
      layer: ui
      role: contracts
    "*.styles.ts":
      layer: ui
      role: styles
    "*.storage.ts":
      layer: data
      role: storage
  standard_feature_contract:
    flow:
      - screen -> view
      - screen -> viewmodel
      - view -> block|scaffold|styles|contracts
      - viewmodel -> store|usecase|repository|runtime
      - usecase -> domain
      - repository -> datasource|domain
      - datasource -> external_io
      - model -> domain_only
  scaffolding:
    create_tests: true
    create_readme: false
    create_contract: true
documentation:
  markdown_authority_enabled: false
  owner_update_policy: nearest_owner_by_default
  cross_cutting_requires_explicit_reason: true
path_map:
  src/platform/ui: platform_ui
  src/platform/ui/theme: platform_ui_theme
  src/platform/ui/primitives: platform_ui_primitives
  src/platform/ui/components: platform_ui_components
  src/platform/ui/visualizer: platform_ui_visualizer
  src/features/auth: auth
  src/features/auth/ui: auth_ui
  src/features/settings: settings
contract_resolution:
  order:
    - task
    - module
    - feature
    - layer
    - repository
  override_policy: narrower_only
