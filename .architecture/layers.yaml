schema: v1
layers:
  ui:
    can_import:
      - ui
      - shared
  feature:
    can_import:
      - feature
      - ui
      - shared
  shared:
    can_import:
      - shared
architecture:
  patterns:
    mvvm:
      layers:
        - ui
        - viewmodel
        - usecase
        - repository
        - data
        - domain
      allowed_dependencies:
        ui:
          - viewmodel
          - domain
        viewmodel:
          - usecase
          - domain
          - repository
          - data
        usecase:
          - repository
          - domain
          - data
        repository:
          - data
          - domain
        data:
          - repository
          - data
          - domain
        domain: []
